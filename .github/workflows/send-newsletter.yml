name: Send 2894_signals newsletter

on:
  push:
    branches:
      - main
    paths:
      - "reports/*-ai-news.md"
      - "config/approval.json"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check user approval
        id: approval
        run: node scripts/check-approval.js
        continue-on-error: true

      - name: Skip send without approval
        if: steps.approval.outcome != 'success'
        run: |
          echo "::notice::Envio cancelado — falta tu Aprobado en Cursor."
          exit 0

      - name: Validate subscribers (max 5 affiliates)
        if: steps.approval.outcome == 'success'
        run: |
          node -e "
          const s = require('./config/subscribers.json');
          const list = [s.owner_email, ...(s.affiliates||[])].filter(Boolean);
          if ((s.affiliates||[]).length > 5) { console.error('Max 5 affiliates'); process.exit(1); }
          console.log('Destinatarios:', list.join(', '));
          "

      - name: Send email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: node scripts/send-report-email.js

      - name: Reset approval after send
        if: steps.approval.outcome == 'success'
        run: |
          node scripts/reset-approval.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/approval.json
          git diff --staged --quiet || git commit -m "Reset newsletter approval after send"
          git push || true
