name: 2894_signals — Lunes automatico

on:
  schedule:
    # Lunes 07:00 UTC (~08:00 hora España invierno / 09:00 verano)
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  prepare-weekly-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check monthly budget
        id: budget
        run: node scripts/check-budget.js
        continue-on-error: true

      - name: Stop if budget exceeded
        if: steps.budget.outcome == 'failure'
        run: |
          echo "::notice::Generacion cancelada para proteger creditos Cursor."
          exit 0

      - name: Skip if today's report already exists
        id: exists
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f "reports/${DATE}-ai-news.md" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Informe de hoy ya existe: reports/${DATE}-ai-news.md"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Cursor agent via GitHub issue
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh label create "weekly-report" --color "4CBFFF" 2>/dev/null || true
          ISSUE_URL=$(gh issue create \
            --title "2894_signals — generar informe $DATE" \
            --label "weekly-report" \
            --body "$(cat <<EOF
          @cursor

          Genera el informe semanal **2894_signals** para el mundo creativo.

          1. Lee \`prompts/ai-news-creative-lite.md\`
          2. Investiga novedades de esta semana (fuentes oficiales + LinkedIn/Medium si hay evidencia)
          3. Guarda el informe en \`reports/${DATE}-ai-news.md\`
          4. Ejecuta: \`node scripts/record-generation.js\`
          5. Haz commit y push a la rama \`main\` de: \`reports/${DATE}-ai-news.md\` y \`config/budget.json\`

          Reglas:
          - No inventes fuentes
          - Espanol ejecutivo
          - Si \`config/budget.json\` indica limite alcanzado, NO generes informe

          Al guardarse el informe, el workflow **Send weekly newsletter** enviara el email automaticamente a los suscriptores.
          EOF
          )")
          echo "Issue creado: $ISSUE_URL"

      - name: Notify report already ready
        if: steps.exists.outputs.exists == 'true'
        run: |
          echo "::notice::El informe de hoy ya existe. Se enviara en el workflow de email programado."
