name: Publish 2894_signals web

on:
  push:
    branches:
      - main
    paths:
      - "reports/*-ai-news.md"
      - "templates/**"
      - "scripts/lib/**"
      - "scripts/publish-online.js"
      - "scripts/parse-report.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build web edition
        run: node scripts/publish-online.js

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          commit_message: "Publish 2894_signals web edition"
